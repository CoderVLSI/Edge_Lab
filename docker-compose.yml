version: "3.9"

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: edgelab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend/api
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/edgelab
      JWT_SECRET: ${JWT_SECRET:-dev-secret}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: edge-lab-files
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      WEB_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  sync-server:
    build:
      context: ./backend/sync-server
      dockerfile: Dockerfile
    ports:
      - "1234:1234"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/edgelab
      SYNC_PORT: "1234"
    depends_on:
      postgres:
        condition: service_healthy

  lsp-gateway:
    build:
      context: ./backend/lsp-gateway
      dockerfile: Dockerfile
    ports:
      - "1235:1235"
    environment:
      LSP_PORT: "1235"

volumes:
  postgres_data:
  minio_data:
